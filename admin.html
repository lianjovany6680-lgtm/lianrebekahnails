<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ניהול | Lian Rebekah Nails</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="booking.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Heebo:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#c97a96"/>
</head>
<body class="booking-page admin-page">

  <!-- LOGIN OVERLAY -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-box">
      <img src="Screenshot 2026-03-27 122808.png" alt="logo" style="height:70px;margin-bottom:20px;"/>
      <h2>כניסה לניהול</h2>
      <input type="password" id="passInput" placeholder="סיסמה" />
      <button id="loginBtn" class="btn-confirm">כניסה</button>
      <p class="login-err hidden" id="loginErr">סיסמה שגויה</p>
    </div>
  </div>

  <!-- ADMIN CONTENT -->
  <div class="admin-wrap hidden" id="adminWrap">

    <!-- SIDEBAR -->
    <aside class="admin-sidebar">
      <button class="sidebar-toggle" id="sidebarToggle">☰</button>
      <img src="Screenshot 2026-03-27 122808.png" alt="logo" class="admin-logo"/>
      <nav class="admin-nav">
        <button class="admin-nav-btn active" data-panel="dashboard">📊 לוח בקרה</button>
        <button class="admin-nav-btn" data-panel="calendar">📅 יומן תורים</button>
        <button class="admin-nav-btn" data-panel="appointments">📋 כל התורים</button>
        <button class="admin-nav-btn" data-panel="settings">⚙️ הגדרות</button>
        <button class="admin-nav-btn" data-panel="services">💅 שירותים</button>
      </nav>
      <button class="admin-logout" id="logoutBtn">יציאה</button>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="admin-main">

      <!-- DASHBOARD -->
      <div class="admin-panel active" id="panel-dashboard">
        <h1 class="admin-title">לוח בקרה</h1>
        <div class="dash-stats">
          <div class="dash-stat">
            <span class="dash-stat-num" id="statToday">0</span>
            <p>תורים היום</p>
          </div>
          <div class="dash-stat">
            <span class="dash-stat-num" id="statWeek">0</span>
            <p>תורים השבוע</p>
          </div>
          <div class="dash-stat">
            <span class="dash-stat-num" id="statTotal">0</span>
            <p>סה"כ תורים</p>
          </div>
          <div class="dash-stat">
            <span class="dash-stat-num" id="statPending">0</span>
            <p>ממתינים לאישור</p>
          </div>
        </div>
        <h2 class="admin-section-title">תורים להיום</h2>
        <div id="todayList" class="appt-list"></div>
        <h2 class="admin-section-title" style="margin-top:32px">תורים מחר</h2>
        <div id="tomorrowList" class="appt-list"></div>
      </div>

      <!-- CALENDAR -->
      <div class="admin-panel" id="panel-calendar">
        <h1 class="admin-title">יומן תורים</h1>
        <div class="admin-cal-wrap">
          <div class="cal-header">
            <button id="adminPrevMonth">&#8250;</button>
            <span id="adminCalTitle"></span>
            <button id="adminNextMonth">&#8249;</button>
          </div>
          <div class="cal-days-header">
            <span>א'</span><span>ב'</span><span>ג'</span><span>ד'</span><span>ה'</span><span>ו'</span><span>ש'</span>
          </div>
          <div class="cal-grid" id="adminCalGrid"></div>
        </div>
        <div class="admin-day-view" id="adminDayView">
          <h2 id="adminDayTitle">בחרי יום לצפייה</h2>
          <div id="adminDayAppts" class="appt-list"></div>
          <button class="btn-block-day" id="blockDayBtn">🚫 חסום יום זה</button>
        </div>
      </div>

      <!-- ALL APPOINTMENTS -->
      <div class="admin-panel" id="panel-appointments">
        <h1 class="admin-title">כל התורים</h1>
        <div class="appt-filters">
          <select id="filterStatus">
            <option value="all">כל הסטטוסים</option>
            <option value="pending">ממתין</option>
            <option value="confirmed">מאושר</option>
            <option value="completed">הושלם</option>
            <option value="cancelled">בוטל</option>
          </select>
          <input type="date" id="filterDate" placeholder="סנן לפי תאריך"/>
          <button class="btn-clear-filter" id="clearFilter">נקה סינון</button>
        </div>
        <div id="allApptList" class="appt-list"></div>
      </div>

      <!-- SETTINGS -->
      <div class="admin-panel" id="panel-settings">
        <h1 class="admin-title">הגדרות</h1>

        <div class="settings-section">
          <h2>שעות עבודה</h2>
          <div class="work-days" id="workDaysEditor"></div>
        </div>

        <div class="settings-section">
          <h2>הגדרות כלליות</h2>
          <div class="form-group">
            <label>מרווח בין תורים (דקות)</label>
            <select id="slotInterval">
              <option value="15">15 דקות</option>
              <option value="30">30 דקות</option>
              <option value="45">45 דקות</option>
              <option value="60">60 דקות</option>
            </select>
          </div>
          <div class="form-group">
            <label>מספר וואטסאפ (לקבלת התראות)</label>
            <input type="text" id="waPhoneInput" placeholder="972XXXXXXXXX"/>
          </div>
          <div class="form-group">
            <label>סיסמת ניהול</label>
            <input type="password" id="newPassInput" placeholder="סיסמה חדשה"/>
          </div>
        </div>

        <div class="settings-section">
          <h2>תאריכים חסומים</h2>
          <div class="blocked-dates-wrap">
            <div class="form-group" style="flex-direction:row;gap:12px;align-items:center">
              <input type="date" id="blockDateInput"/>
              <button class="btn-add-block" id="addBlockDate">+ חסום תאריך</button>
            </div>
            <div id="blockedDatesList" class="blocked-list"></div>
          </div>
        </div>

        <button class="btn-confirm" id="saveSettings">שמור הגדרות ✓</button>
        <p class="save-msg hidden" id="saveMsg">✅ נשמר בהצלחה!</p>
      </div>

      <!-- SERVICES -->
      <div class="admin-panel" id="panel-services">
        <h1 class="admin-title">ניהול שירותים</h1>
        <div id="servicesEditor" class="services-editor"></div>
        <button class="btn-add-service" id="addServiceBtn">+ הוסף שירות</button>
        <button class="btn-confirm" id="saveServices" style="margin-top:16px">שמור שירותים ✓</button>
        <p class="save-msg hidden" id="saveSvcMsg">✅ נשמר בהצלחה!</p>
      </div>

    </main>
  </div>

  <script src="booking.js" defer></script>
  <script src="admin-ui.js" defer></script>
</body>
</html>
